<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome to Big Dog Club 🏆</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Nunito', sans-serif;
      background: #0D0A05;
      color: #F5E6C8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
      overflow: hidden;
    }

    .confetti-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .content { position: relative; z-index: 1; max-width: 520px; }

    .badge-new {
      display: inline-block;
      background: linear-gradient(135deg, #FFCD6B, #FF8C42);
      color: #2D1A00;
      font-size: 0.8rem;
      font-weight: 900;
      padding: 5px 16px;
      border-radius: 50px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 28px;
    }

    .trophy {
      font-size: 80px;
      display: block;
      margin-bottom: 20px;
      animation: bounce 1s ease-in-out 3;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }

    h1 {
      font-size: clamp(2rem, 8vw, 3.5rem);
      font-weight: 900;
      background: linear-gradient(135deg, #FFCD6B, #FF8C42);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.1;
      margin-bottom: 16px;
    }

    .username {
      font-size: 1.3rem;
      color: #FFCD6B;
      font-weight: 700;
      margin-bottom: 8px;
    }

    p {
      color: #8a6a40;
      font-size: 1.05rem;
      line-height: 1.7;
      margin-bottom: 16px;
    }

    .follow-status {
      background: #1a120a;
      border: 1px solid #3a2810;
      border-radius: 16px;
      padding: 20px 28px;
      margin: 28px 0;
    }

    .follow-status h3 {
      font-size: 0.9rem;
      font-weight: 900;
      color: #6a5030;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 14px;
    }

    .follow-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 0;
      border-bottom: 1px solid #2a1a08;
      font-weight: 700;
      color: #FFCD6B;
    }

    .follow-row:last-child { border-bottom: none; }
    .follow-row span { font-size: 1.2rem; }

    .btn-tiktok {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #000;
      color: #fff;
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      padding: 14px 28px;
      border-radius: 50px;
      text-decoration: none;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      margin-top: 8px;
    }

    .paw-trail {
      margin-top: 36px;
      font-size: 1.5rem;
      letter-spacing: 8px;
      opacity: 0.4;
    }
  </style>
</head>
<body>

  <div class="confetti-container" id="confetti"></div>

  <div class="content">
    <div class="badge-new">🏆 New Member</div>
    <span class="trophy">🏆</span>

    <h1>You're a Big Dog now.</h1>

    <p class="username" id="display-name">Welcome to the club.</p>

    <p>
      Patrick is extremely proud of you. He has no idea what's happening
      but he's wagging his tail anyway.
    </p>

    <div class="follow-status">
      <h3>Followed</h3>
      <div class="follow-row">
        <span>🐶</span> @patrickbigdog
        <span style="margin-left:auto; color: #4CAF50;">✓</span>
      </div>
      <div class="follow-row">
        <span>🏆</span> @bigdogclub
        <span style="margin-left:auto; color: #4CAF50;">✓</span>
      </div>
    </div>

    <p>Now go tap your merch. Things happen when you tap.</p>

    <a href="https://tiktok.com/@patrickbigdog" class="btn-tiktok">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V8.75a8.28 8.28 0 004.84 1.55V6.85a4.85 4.85 0 01-1.07-.16z"/></svg>
      See Patrick's latest
    </a>

    <div class="paw-trail">🐾🐾🐾🐾🐾</div>
  </div>

  <script>
    // Parse display name from session cookie
    function getCookie(name) {
      const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
      return match ? match[2] : null;
    }

    try {
      const raw = getCookie('bdc_session');
      if (raw) {
        const session = JSON.parse(atob(raw));
        if (session.display_name) {
          document.getElementById('display-name').textContent =
            `Welcome, ${session.display_name} 🐾`;
        }
      }
    } catch {}

    // Confetti
    const container = document.getElementById('confetti');
    const colors = ['#FFCD6B', '#FF8C42', '#fff', '#C75B1A', '#FFE0B2'];
    for (let i = 0; i < 120; i++) {
      const el = document.createElement('div');
      const size = Math.random() * 10 + 5;
      const color = colors[Math.floor(Math.random() * colors.length)];
      const left = Math.random() * 100;
      const delay = Math.random() * 3;
      const duration = Math.random() * 3 + 2;
      el.style.cssText = `
        position: absolute;
        width: ${size}px; height: ${size}px;
        background: ${color};
        border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
        left: ${left}%;
        top: -20px;
        opacity: 0;
        animation: fall ${duration}s ${delay}s ease-in forwards;
        transform: rotate(${Math.random() * 360}deg);
      `;
      container.appendChild(el);
    }

    const style = document.createElement('style');
    style.textContent = `
      @keyframes fall {
        0% { top: -5%; opacity: 1; transform: rotate(0deg) translateX(0); }
        100% { top: 110%; opacity: 0; transform: rotate(${Math.random() * 720}deg) translateX(${Math.random() * 100 - 50}px); }
      }
    `;
    document.head.appendChild(style);
  </script>

</body>
</html>
