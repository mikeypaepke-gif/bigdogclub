name = "bigdogclub-vip"
compatibility_date = "2024-01-01"
pages_build_output_dir = "."

# Environment variables — set secrets in Cloudflare dashboard, NOT here
# Dashboard → Pages → bigdogclub-vip → Settings → Environment Variables
#
# Required secrets (mark as "Secret"):
#   TIKTOK_CLIENT_KEY     = awtn0vkmpbgkr7hv
#   TIKTOK_CLIENT_SECRET  = (your secret)
#
# Note: redirect_uri and base URLs are now derived dynamically from the request host,
# so the same deployment handles both bigdogclub.vip and patrickbig.dog automatically.
# Just register both callback URLs in the TikTok developer portal:
#   https://bigdogclub.vip/api/auth/callback
#   https://patrickbig.dog/api/auth/callback
