<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You Found Patrick 🐾</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(160deg, #FFCD6B 0%, #FF8C42 50%, #C75B1A 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
      overflow: hidden;
    }

    .paw-bg {
      position: fixed;
      inset: 0;
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      opacity: 0.07;
      pointer-events: none;
      font-size: 48px;
      overflow: hidden;
    }

    .content { position: relative; z-index: 1; max-width: 420px; }

    .found-badge {
      background: #fff;
      color: #C75B1A;
      font-size: 0.8rem;
      font-weight: 900;
      padding: 6px 18px;
      border-radius: 50px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 28px;
      display: inline-block;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }

    .dog-icon {
      font-size: 90px;
      display: block;
      margin-bottom: 16px;
      animation: wag 0.5s ease-in-out infinite alternate;
      transform-origin: bottom center;
    }

    @keyframes wag {
      0% { transform: rotate(-8deg); }
      100% { transform: rotate(8deg); }
    }

    h1 {
      font-size: clamp(2.2rem, 8vw, 3.8rem);
      font-weight: 900;
      color: #fff;
      text-shadow: 0 4px 20px rgba(0,0,0,0.2);
      line-height: 1.1;
      margin-bottom: 12px;
    }

    .item-name {
      background: rgba(255,255,255,0.25);
      color: #fff;
      font-size: 0.9rem;
      font-weight: 700;
      padding: 4px 16px;
      border-radius: 50px;
      display: inline-block;
      margin-bottom: 20px;
      letter-spacing: 1px;
    }

    p {
      color: #fff3e0;
      font-size: 1.1rem;
      line-height: 1.7;
      margin-bottom: 32px;
    }

    .cta-stack {
      display: flex;
      flex-direction: column;
      gap: 14px;
      align-items: center;
    }

    .btn-join {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #fff;
      color: #C75B1A;
      font-family: 'Nunito', sans-serif;
      font-size: 1.15rem;
      font-weight: 900;
      padding: 16px 36px;
      border-radius: 50px;
      text-decoration: none;
      box-shadow: 0 6px 30px rgba(0,0,0,0.2);
      transition: transform 0.2s;
      width: 100%;
      justify-content: center;
    }
    .btn-join:hover { transform: scale(1.03); }

    .btn-tiktok {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #000;
      color: #fff;
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      padding: 14px 28px;
      border-radius: 50px;
      text-decoration: none;
      width: 100%;
      justify-content: center;
    }

    .tap-count {
      margin-top: 28px;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.5);
    }

    .tap-count span {
      color: rgba(255,255,255,0.85);
      font-weight: 900;
    }
  </style>
</head>
<body>

  <!-- Paw pattern background -->
  <div class="paw-bg" id="pawBg"></div>

  <div class="content">
    <div class="found-badge">📲 NFC Tap Detected</div>

    <span class="dog-icon">🐶</span>

    <h1>You Found Patrick!</h1>

    <div class="item-name" id="itemLabel">🎾 Tennis Ball #001</div>

    <p>
      This ball belongs to Patrick. He has approximately 47 more just like it.
      He doesn't share. But he'll let you join the club.
    </p>

    <div class="cta-stack">
      <a href="/api/auth/login" class="btn-join">
        🏆 Join the Big Dog Club
      </a>
      <a href="https://tiktok.com/@patrickbigdog" class="btn-tiktok">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V8.75a8.28 8.28 0 004.84 1.55V6.85a4.85 4.85 0 01-1.07-.16z"/></svg>
        Follow @patrickbigdog
      </a>
    </div>

    <p class="tap-count">Tap #<span id="tapNum">1</span> on this item</p>
  </div>

  <script>
    // Fill paw background
    const bg = document.getElementById('pawBg');
    for (let i = 0; i < 60; i++) {
      const el = document.createElement('div');
      el.textContent = '🐾';
      bg.appendChild(el);
    }

    // Parse tag ID and tap count from URL params
    // NFC tags should link to: https://bigdogclub.vip/tap?id=TAGID&type=ball
    const params = new URLSearchParams(window.location.search);
    const tagType = params.get('type') || 'ball';
    const tagId = params.get('id') || '001';

    const labels = {
      ball: `🎾 Tennis Ball #${tagId}`,
      keychain: `🔑 Keychain #${tagId}`,
      tag: `🏷️ Dog Tag #${tagId}`,
    };
    document.getElementById('itemLabel').textContent = labels[tagType] || labels.ball;

    // Tap counter (localStorage per tag ID)
    const storageKey = `tap_${tagId}`;
    const taps = (parseInt(localStorage.getItem(storageKey) || '0') + 1);
    localStorage.setItem(storageKey, taps.toString());
    document.getElementById('tapNum').textContent = taps;

    // Returning tapper — swap messaging
    if (taps > 1) {
      document.querySelector('p').textContent =
        taps >= 50
          ? `${taps} taps. Patrick is impressed. That's actually insane. 🏆`
          : taps >= 10
          ? `Tap #${taps}. You keep coming back. Patrick respects that.`
          : `Welcome back. Patrick remembered you. (He didn't. But still.)`;
    }
  </script>

</body>
</html>
